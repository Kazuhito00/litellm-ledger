# Google Gemini pricing (USD per 1M tokens)
# Source: https://ai.google.dev/gemini-api/docs/pricing
# Updated: 2026-02-27
# Models: Gemini 2.5 series (GA only)
#
# Note on thinking tokens:
#   GA version: thinking tokens are billed at the same rate as output tokens.
#   The `thinking` key is set explicitly here for clarity and future-proofing.
#
[models."gemini/gemini-2.5-pro"]
input    = 1.25
output   = 10.00
thinking = 10.00

[models."gemini/gemini-2.5-pro".tier_over]
threshold = 200000
input     = 2.50
output    = 15.00
thinking  = 15.00

[models."gemini/gemini-2.5-flash"]
input    = 0.30
output   = 2.50
thinking = 2.50

[models."gemini/gemini-2.5-flash-lite"]
input    = 0.10
output   = 0.40
thinking = 0.40
